steps:
  - group: "Coverage"
    # Scheduled (julia-ci) builds, plus "needs full CI"-labeled PRs. Only
    # julia-ci holds the codecov / coveralls bearer tokens; PR builds run
    # the same coverage collection but skip the uploads (the lcov tarball
    # is still available as a buildkite artifact).
    if: (build.source == "schedule") || (build.pull_request.labels includes "needs full CI")
    notify:
      - github_commit_status:
          context: "Coverage"
    steps:
      - label: ":linux: coverage (x86_64)"
        key:   "coverage-linux"
        plugins:
          - JuliaCI/external-buildkite#v1:
              version: "./.buildkite-external-version"
              repo_url: "https://github.com/JuliaCI/julia-buildkite"
          - JuliaCI/julia#v1:
              # Drop default "registries" directory, so it is not persisted from execution to execution
              persist_depot_dirs: packages,artifacts,compiled
              version: '1.11' # GREP_ME: Keep this updated. Do not set it to '1' or 'stable' or 'latest'.
          - JuliaCI/sandbox#v2:
              rootfs_url: https://github.com/JuliaCI/rootfs-images/releases/download/v8.2/package_linux.x86_64.tar.gz
              rootfs_treehash: "3446de08cb5b6239c00910e1f7afe432a53d2932"
              uid: 1000
              gid: 1000
        timeout_in_minutes: 600 # 10h
        commands: |
          echo "--- Obtain coverage tokens"
          # Coverage tokens are fetched from SSM Parameter Store with this
          # job's OIDC identity; no static secrets exist in CI config.
          # PR builds hold no tokens at all (there is no tokens role for
          # julia-pr): collect coverage anyway, skip the uploads below.
          if [[ "$${BUILDKITE_PIPELINE_SLUG}" == "julia-pr" ]]; then
            echo "PR build: no coverage tokens; coverage uploads will be skipped"
          else
            source .buildkite/utilities/aws_oidc.sh tokens
            export CODECOV_TOKEN="$$(aws ssm get-parameter --with-decryption --name /julia-ci/tokens/codecov_token --query Parameter.Value --output text)"
            export COVERALLS_TOKEN="$$(aws ssm get-parameter --with-decryption --name /julia-ci/tokens/coveralls_token --query Parameter.Value --output text)"
          fi

          echo "--- Build Julia from source"
          make --output-sync -j$${JULIA_NUM_THREADS}

          echo "--- Print Julia version info"
          ./julia --color=yes -e 'using InteractiveUtils; InteractiveUtils.versioninfo()'
          ./julia --color=yes -e '@info "" Sys.CPU_THREADS'
          # this is necessary to make sure that the LibGit2 tests passes
          git config --global init.defaultBranch master

          echo "--- Run Julia tests in parallel with code coverage enabled"
          export JULIA_NUM_THREADS=1
          export JULIA_WORKER_TIMEOUT=1200 # 1200 seconds = 20 minutes
          ./julia --color=yes -e 'import Distributed; @info "" Distributed.worker_timeout()'
          ./julia --color=yes .buildkite/pipelines/scheduled/coverage/run_tests_parallel.jl

          echo "--- Move the lcov files into the `./lcov_files` directory"
          ls *.info
          mkdir -p lcov_files
          mv *.info lcov_files
          ls lcov_files

          echo "--- Upload lcov files"
          tar -zcf lcov_files.tar.gz lcov_files/
          buildkite-agent artifact upload lcov_files.tar.gz

          echo "--- Process and upload coverage information"
          if [[ -n "$${CODECOV_TOKEN:-}" ]]; then
            ./julia --color=yes .buildkite/pipelines/scheduled/coverage/upload_coverage.jl
          else
            echo "No coverage tokens (PR build); skipping upload"
          fi
        agents:
          queue: "test"
          # Only run on `sandbox.jl` machines (not `docker`-isolated ones) since we need nestable sandboxing
          sandbox_capable: "true"
          os: "linux"
          arch: "x86_64"
        env:
          # Set build number for Coveralls parallel mode
          COVERALLS_SERVICE_NUMBER: ${BUILDKITE_BUILD_NUMBER}

      - label: ":macos: coverage (aarch64)"
        key:   "coverage-macos-aarch64"
        plugins:
          - JuliaCI/external-buildkite#v1:
              version: "./.buildkite-external-version"
              repo_url: "https://github.com/JuliaCI/julia-buildkite"
          - JuliaCI/julia#v1:
              # Drop default "registries" directory, so it is not persisted from execution to execution
              persist_depot_dirs: packages,artifacts,compiled
              version: '1.11' # GREP_ME: Keep this updated. Do not set it to '1' or 'stable' or 'latest'.
        timeout_in_minutes: 300 # 5h
        commands: |
          echo "--- Obtain coverage tokens"
          # Coverage tokens are fetched from SSM Parameter Store with this
          # job's OIDC identity; no static secrets exist in CI config.
          # PR builds hold no tokens at all (there is no tokens role for
          # julia-pr): collect coverage anyway, skip the uploads below.
          if [[ "$${BUILDKITE_PIPELINE_SLUG}" == "julia-pr" ]]; then
            echo "PR build: no coverage tokens; coverage uploads will be skipped"
          else
            source .buildkite/utilities/aws_oidc.sh tokens
            export CODECOV_TOKEN="$$(aws ssm get-parameter --with-decryption --name /julia-ci/tokens/codecov_token --query Parameter.Value --output text)"
            export COVERALLS_TOKEN="$$(aws ssm get-parameter --with-decryption --name /julia-ci/tokens/coveralls_token --query Parameter.Value --output text)"
          fi

          echo "--- Build Julia from source"
          make -j$${JULIA_NUM_THREADS}

          echo "--- Print Julia version info"
          ./julia --color=yes -e 'using InteractiveUtils; InteractiveUtils.versioninfo()'
          ./julia --color=yes -e '@info "" Sys.CPU_THREADS'
          # this is necessary to make sure that the LibGit2 tests passes
          git config --global init.defaultBranch master

          echo "--- Run Julia tests in parallel with code coverage enabled"
          export JULIA_NUM_THREADS=1
          export JULIA_WORKER_TIMEOUT=1200 # 1200 seconds = 20 minutes
          ./julia --color=yes -e 'import Distributed; @info "" Distributed.worker_timeout()'
          ./julia --color=yes .buildkite/pipelines/scheduled/coverage/run_tests_parallel.jl

          echo "--- Move the lcov files into the `./lcov_files` directory"
          ls *.info
          mkdir -p lcov_files
          mv *.info lcov_files
          ls lcov_files

          echo "--- Upload lcov files"
          tar -zcf lcov_files.tar.gz lcov_files/
          buildkite-agent artifact upload lcov_files.tar.gz

          echo "--- Process and upload coverage information"
          if [[ -n "$${CODECOV_TOKEN:-}" ]]; then
            ./julia --color=yes .buildkite/pipelines/scheduled/coverage/upload_coverage.jl
          else
            echo "No coverage tokens (PR build); skipping upload"
          fi
        agents:
          queue: "test"
          os: "macos"
          arch: "aarch64"
        env:
          JULIA_SHELL: "/bin/bash"
          # Set build number for Coveralls parallel mode
          COVERALLS_SERVICE_NUMBER: ${BUILDKITE_BUILD_NUMBER}

      - label: ":windows: coverage (x86_64)"
        key:   "coverage-windows-x86_64"
        plugins:
          - JuliaCI/external-buildkite#v1:
              version: "./.buildkite-external-version"
              repo_url: "https://github.com/JuliaCI/julia-buildkite"
          - JuliaCI/julia#v1:
              # Drop default "registries" directory, so it is not persisted from execution to execution
              persist_depot_dirs: packages,artifacts,compiled
              version: '1.11' # GREP_ME: Keep this updated. Do not set it to '1' or 'stable' or 'latest'.
          - docker#v3.13.0:
              image: "juliapackaging/package-windows-x86_64:v8.3"
              always-pull: true
              command: ["bash", "-c", "
                echo '--- Obtain coverage tokens' &&
                if [[ $${BUILDKITE_PIPELINE_SLUG} == julia-pr ]]; then
                  echo 'PR build: no coverage tokens; coverage uploads will be skipped';
                else
                  source .buildkite/utilities/aws_oidc.sh tokens &&
                  export CODECOV_TOKEN=$$(aws ssm get-parameter --with-decryption --name /julia-ci/tokens/codecov_token --query Parameter.Value --output text) &&
                  export COVERALLS_TOKEN=$$(aws ssm get-parameter --with-decryption --name /julia-ci/tokens/coveralls_token --query Parameter.Value --output text);
                fi &&
                echo '--- Build Julia from source' &&
                make -j$${JULIA_NUM_THREADS} VERBOSE=1 &&
                echo '--- Print Julia version info' &&
                ./usr/bin/julia.exe --color=yes -e 'using InteractiveUtils; InteractiveUtils.versioninfo()' &&
                ./usr/bin/julia.exe --color=yes -e '@info \"\" Sys.CPU_THREADS' &&
                git config --global init.defaultBranch master &&
                echo '--- Run Julia tests in parallel with code coverage enabled' &&
                export JULIA_NUM_THREADS=1 &&
                export JULIA_WORKER_TIMEOUT=1200 &&
                ./usr/bin/julia.exe --color=yes -e 'import Distributed; @info \"\" Distributed.worker_timeout()' &&
                ./usr/bin/julia.exe --color=yes .buildkite/pipelines/scheduled/coverage/run_tests_parallel.jl &&
                echo '--- Move the lcov files into the ./lcov_files directory' &&
                ls *.info &&
                mkdir -p lcov_files &&
                mv *.info lcov_files &&
                ls lcov_files &&
                echo '--- Upload lcov files' &&
                tar -zcf lcov_files.tar.gz lcov_files/ &&
                buildkite-agent artifact upload lcov_files.tar.gz &&
                echo '--- Process and upload coverage information' &&
                if [[ -n $${CODECOV_TOKEN:-} ]]; then
                  ./usr/bin/julia.exe --color=yes .buildkite/pipelines/scheduled/coverage/upload_coverage.jl;
                else
                  echo 'No coverage tokens (PR build); skipping upload';
                fi
                "]
              propagate-environment: true
              volumes:
                # Mount buildkite-agent as well
                - "C:\\buildkite-agent\\bin:C:\\buildkite-agent\\bin"
              environment:
                - "JULIA_CPU_THREADS"
                - "BUILDKITE_AGENT_ACCESS_TOKEN"
                - "BUILDKITE_BRANCH"
                - "BUILDKITE_COMMIT"
                - "BUILDKITE_REPO"
                - "BUILDKITE_MESSAGE"
                - "BUILDKITE_BUILD_AUTHOR"
                - "BUILDKITE_BUILD_CREATOR"
                - "BUILDKITE_BUILD_AUTHOR_EMAIL"
                - "BUILDKITE_BUILD_CREATOR_EMAIL"
                - "BUILDKITE_PULL_REQUEST"
                - "BUILDKITE_BUILD_NUMBER"
                - "BUILDKITE_PIPELINE_SLUG"
        timeout_in_minutes: 540 # 9h
        agents:
          queue: "test"
          os: "windows"
          arch: "x86_64"
        env:
          JULIA_SHELL: "/bin/bash"
          # Set build number for Coveralls parallel mode
          COVERALLS_SERVICE_NUMBER: ${BUILDKITE_BUILD_NUMBER}

      - label: "Finalize parallel coverage"
        key: "coverage-finalize"
        depends_on:
          - step: "coverage-linux"
            allow_failure: true
          - step: "coverage-macos-aarch64"
            allow_failure: true
          - step: "coverage-windows-x86_64"
            allow_failure: true
        plugins:
          - JuliaCI/external-buildkite#v1:
              version: "./.buildkite-external-version"
              repo_url: "https://github.com/JuliaCI/julia-buildkite"
          - JuliaCI/julia#v1:
              # Drop default "registries" directory, so it is not persisted from execution to execution
              persist_depot_dirs: packages,artifacts,compiled
              version: '1.11' # GREP_ME: Keep this updated. Do not set it to '1' or 'stable' or 'latest'.
        timeout_in_minutes: 10
        commands: |
          echo "--- Signal completion of parallel coverage uploads"
          # PR builds hold no tokens and did not upload anything, so there
          # is nothing to finalize there.
          if [[ "$${BUILDKITE_PIPELINE_SLUG}" == "julia-pr" ]]; then
            echo "PR build: nothing was uploaded; nothing to finalize"
          else
            # The coveralls token is fetched from SSM Parameter Store with
            # this job's OIDC identity; no static secrets exist in CI config.
            source .buildkite/utilities/aws_oidc.sh tokens
            export COVERALLS_TOKEN="$$(aws ssm get-parameter --with-decryption --name /julia-ci/tokens/coveralls_token --query Parameter.Value --output text)"
            julia --color=yes .buildkite/pipelines/scheduled/coverage/finish_parallel_coverage.jl
          fi
        agents:
          queue: "test"
          os: "linux"
          arch: "x86_64"
        env:
          # Set build number for Coveralls parallel mode
          COVERALLS_SERVICE_NUMBER: ${BUILDKITE_BUILD_NUMBER}
