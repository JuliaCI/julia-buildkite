# Launched by the julia-publish pipeline. A single trusted step signs and
# promotes every staged build to its final release location, then deploys
# docs. This is the only place release secrets (KMS signing keys) are used.
steps:
  - group: "Publish"
    steps:
      - label: ":lock: publish all"
        key: "publish_all"
        # No in-pipeline build dependency: reads the unsigned tarballs from
        # the commit-sha-gated staging area in S3 (written by the build
        # pipeline). One job, all triplets.
        concurrency: 1
        concurrency_group: 'publish/julialangnightlies'
        concurrency_method: eager
        plugins:
          - JuliaCI/external-buildkite#v1:
              version: "./.buildkite-external-version"
              repo_url: "https://github.com/JuliaCI/julia-buildkite"
          - JuliaCI/julia#v1:
              # A HOST julia, used to patch the pkgimage checksums inside
              # the (foreign-platform) signed install trees -- the target
              # binaries cannot run here. Not the julia being published.
              # (The julia#v1 plugin's julia is mounted into the sandbox
              # below, same as the build_linux step.)
              persist_depot_dirs: packages,artifacts,compiled
              version: '1.10' # GREP_ME: Keep this updated to LTS. Do not set it to '1' or 'stable' or 'latest'.
          - JuliaCI/sandbox#v2:
              # Run inside the julia_publish rootfs, which carries the full
              # signing/packaging toolchain (aws CLI, p7zip, libdmg-hfsplus +
              # newfs_hfs, wine + Inno Setup, jsign, python). Without this the
              # step runs on a bare agent and fails with `aws: command not
              # found`. x86_64-only image; built by JuliaCI/rootfs-images.
              rootfs_url: https://github.com/JuliaCI/rootfs-images/releases/download/v8.3/julia_publish.x86_64.tar.gz
              rootfs_treehash: "e11a4f12b441b5201ba672077c000bbdea8df244"
              uid: 1000
              gid: 1000
              workspaces:
                # Mount the git object cache so upload_julia.sh's version
                # introspection (git describe) resolves cleanly inside the
                # sandbox, same as the build_linux step.
                - "/cache/repos:/cache/repos"
        timeout_in_minutes: 180
        commands: "bash .buildkite/utilities/publish.sh"
        agents:
          # The signing/packaging toolchain is provided by the julia_publish
          # rootfs via the sandbox plugin above (rcodesign is fetched at
          # runtime). The agent only needs to be able to nest a Sandbox.jl
          # sandbox, hence sandbox_capable.
          queue: "default"
          sandbox_capable: "true"
          os: "linux"
          arch: "x86_64"
        env:
          # The Inno Setup 6 prefix is baked into the julia_publish rootfs at
          # /home/juliaci/.wine (owned by uid 1000). upload_julia.sh runs
          # `wine ISCC.exe` without setting WINEPREFIX, so it would otherwise
          # default to $HOME/.wine -- pin it here so the baked prefix is used
          # regardless of what HOME the sandbox sets.
          WINEPREFIX: "/home/juliaci/.wine"
          # Identify the Azure Trusted Signing app registration for Windows
          # Authenticode signing (not secrets; auth is via Buildkite OIDC
          # workload identity federation -- see windows/codesign.sh and
          # ops/terraform/azure).
          # TODO: fill in after applying ops/terraform/azure
          AZURE_TENANT_ID: "00000000-0000-0000-0000-000000000000"
          AZURE_CLIENT_ID: "00000000-0000-0000-0000-000000000000"

      - label: "deploy docs"
        key: "deploy_docs"
        plugins:
          - JuliaCI/external-buildkite#v1:
              version: "./.buildkite-external-version"
              repo_url: "https://github.com/JuliaCI/julia-buildkite"
        commands: "buildkite-agent pipeline upload .buildkite/pipelines/main/misc/deploy_docs.yml"
        agents:
          queue: "default"
          os: "linux"
          arch: "x86_64"
