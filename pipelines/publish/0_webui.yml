# This file represents what is put into the julia-publish pipeline's webUI
# configuration. It is for tracking changes only; editing it has no effect.
#
# SECURITY: the julia-publish pipeline is the trust boundary. It MUST be
# configured in Buildkite to:
#   * NOT build pull requests (disable "Build pull requests" and "Build pull
#     requests from third-party forked repositories").
#   * Be branch-limited to: master release-* (and build tags v*).
#   * Be triggered only by trusted release builds (a `trigger` step at the end
#     of the build pipeline) and/or the canonical-repo push webhook.
# Because a pull request can never produce a build under this pipeline slug,
# the slug itself is what the julia-ci-publish / julia-ci-docs-deploy IAM
# roles trust -- not the (PR-spoofable) branch name. The publish jobs also
# run verify_trusted_commit.sh as a backstop.
#
# This webUI step loads its launch steps from a pinned julia-buildkite (via
# the external-buildkite plugin), NOT from the triggered build's tree, so a
# malicious build commit cannot alter the publish steps.
steps:
  - group: "Publish"
    steps:
      - label: "Launch publish jobs"
        agents:
          queue: "publish"
          os: "linux"
        plugins:
          - JuliaCI/external-buildkite#v1:
              version: "./.buildkite-external-version"
              repo_url: "https://github.com/JuliaCI/julia-buildkite"
        commands: |
          buildkite-agent pipeline upload .buildkite/pipelines/publish/launch.yml
