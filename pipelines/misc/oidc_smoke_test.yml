# OIDC/IAM trust smoke test -- validates role assumption and every trust
# boundary from inside a build pipeline, WITHOUT building julia.
#
# Usage (see also "Validation" in ops/README.md): temporarily replace the
# webUI steps of julia-pr (or julia-ci) with this file's steps and start a
# new build (any recent julia commit); restore the real webUI
# (pipelines/main/0_webui.yml) afterwards.
#
# NOTE: while validating a julia-buildkite revision that julia's
# `.buildkite-external-version` does not point to yet, replace the
# `version:` below with the julia-buildkite commit sha under test.
steps:
  - label: ":mag: OIDC trust smoke test"
    plugins:
      - JuliaCI/external-buildkite#v1:
          version: "./.buildkite-external-version"
          repo_url: "https://github.com/JuliaCI/julia-buildkite"
      - staticfloat/sandbox#v2:
          # The bare agents do not carry the AWS CLI; like the historical
          # upload jobs, run inside the `aws_uploader` rootfs, which exists
          # to provide aws/git/ssh.
          rootfs_url: "https://github.com/JuliaCI/rootfs-images/releases/download/v6.00/aws_uploader.x86_64.tar.gz"
          rootfs_treehash: "61cb30497604eb1581b3ffd6a8058c150f4cbf8b"
          uid: 1000
          gid: 1000
          workspaces:
            - "/cache/repos:/cache/repos"
    commands: "bash .buildkite/utilities/tests/oidc_smoke_test.sh"
    timeout_in_minutes: 10
    agents:
      queue: "build"
      sandbox_capable: "true"
      os: "linux"
      arch: "x86_64"
