# This file launches all the UNTRUSTED build + test jobs -- which in the
# post-cryptic setup is every job of the julia-pr / julia-ci pipelines:
# none of them hold secrets or signing rights (the trusted work happens in
# the separate julia-publish Buildkite pipeline).
#
# LAUNCH-LATENCY OPTIMIZATION:
#
# Previously this file had five separate launch steps (groups Build / Check /
# Test / Allow Fail) that each ran MANY `buildkite-agent pipeline upload`
# calls -- roughly ~30 in total, one per arches-templated platform YAML and
# per static misc YAML. Each upload is a ~1.5s network round-trip, and they
# ran serially, so they dominated CI launch latency.
#
# Now a SINGLE launch step runs `utilities/render_launch_pipeline.py`, which
# renders ONE pre-grouped pipeline document (one `group:` per label:
# Build / Check / Test / Allow Fail / JuliaSyntax / JuliaLowering / JuliaC,
# plus the wait + julia-publish trigger), and uploads it with ONE
# `pipeline upload`.
#
# The renderer reproduces the old behaviour EXACTLY:
#   * The arches-templated platform YAMLs (platforms/{build,test}_*.yml) are
#     rendered once per arch, with the same per-arch variable substitution the
#     old per-file `pipeline upload` performed (GROUP / ALLOW_FAIL / arches
#     columns). Job grouping, keys, depends_on and soft_fail are preserved.
#   * The static / launcher misc YAMLs (analyzegc, gcext, juliac, juliasyntax,
#     julialowering, ...) are emitted VERBATIM -- their double-dollar runtime
#     escapes and launch-env vars (e.g. gcext/test_revise, whose soft_fail is keyed off
#     ALLOW_FAIL) are left for THIS single `pipeline upload` to interpolate.
#     That is why we still `export ALLOW_FAIL="false"` below.
#   * PowerPC is omitted: launch_powerpc.jl only uploaded powerpc arches for
#     Julia < 1.12, and is a no-op on current master (1.14).
#
# Yes, this is creating another layer of indirection; the flow now looks like:
#
#   [webui] -> launch_untrusted_builders.yml -> render_launch_pipeline.py
#
# however this raises the bar for contributors to add new steps to our CI
# configuration, so I'd rather live with an extra layer of indirection and
# only need to touch the webui configuration when something about the
# launch flow itself changes.

steps:
  - label: ":rocket: Launch jobs"
    plugins:
      - JuliaCI/external-buildkite#v1:
          version: "./.buildkite-external-version"
          repo_url: "https://github.com/JuliaCI/julia-buildkite"
    commands: |
      # gcext.yml / test_revise.yml are emitted verbatim by the renderer and
      # still have a soft_fail keyed off ALLOW_FAIL; this single `pipeline
      # upload` resolves it -- exactly as the old Test launch step did.
      export ALLOW_FAIL="false"
      python3 .buildkite/utilities/render_launch_pipeline.py > pipeline.generated.yml
      buildkite-agent pipeline upload pipeline.generated.yml
    agents:
      queue: "launch"
      os: "linux"
      arch: "x86_64" # prevent from running on PiBots

  # The barrier + trigger of the trusted julia-publish pipeline are emitted by
  # render_launch_pipeline.py at the END of the rendered document, in the SAME
  # `pipeline upload` as the Build/Check/Test/Allow-Fail groups. That is on
  # purpose so the `wait` reliably barriers all of those dynamically-uploaded
  # jobs (a `wait` placed in a separately-uploaded file used to race the build
  # jobs and fire the trigger before anything was built or staged).
  #
  # See render_launch_pipeline.py for the wait + the `julia-publish` trigger
  # (guarded by `if: pipeline.slug == "julia-ci"`). Coverage is launched by a
  # separate upload (launch_coverage.yml) and is intentionally NOT behind this
  # barrier.
