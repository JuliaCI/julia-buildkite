steps:
  - group: "Check"
    steps:
      - label: "whitespace"
        key: "whitespace"
        notify:
        - github_commit_status:
            context: "Whitespace"
        plugins:
          - JuliaCI/external-buildkite#v1:
              version: "./.buildkite-external-version"
              repo_url: "https://github.com/JuliaCI/julia-buildkite"
          - JuliaCI/julia#v1:
              # Drop default "registries" directory, so it is not persisted from execution to execution
              persist_depot_dirs: packages,artifacts,compiled
              version: '1.10' # GREP_ME: Keep this updated to LTS. Do not set it to '1' or 'stable' or 'latest'.
          - JuliaCI/sandbox#v2:
              rootfs_url: https://github.com/JuliaCI/rootfs-images/releases/download/v8.5/package_linux.x86_64.tar.gz
              rootfs_treehash: "8b46765146862479f0a8946f2ef783a8bf93b20f"
              workspaces:
                - "/cache/repos:/cache/repos"
          - JuliaCI/julia#v1:
              # Drop default "registries" directory, so it is not persisted from execution to execution
              persist_depot_dirs: packages,artifacts,compiled
              version: '1.10' # GREP_ME: Keep this updated to LTS. Do not set it to '1' or 'stable' or 'latest'.
        timeout_in_minutes: 10
        commands: |
          make --output-sync -j$${JULIA_CPU_THREADS:?} check-whitespace
        agents:
          queue: "test"
          # Only run on `sandbox.jl`-capable machines (not `docker`-isolated ones) since we need nestable sandboxing
          sandbox_capable: "true"
          os: "linux"
          arch: "x86_64"
