steps:
  - group: "Check"
    steps:
      - label: "analyzegc"
        key: "analyzegc"
        plugins:
          - JuliaCI/external-buildkite#v1:
              version: "./.buildkite-external-version"
              repo_url: "https://github.com/JuliaCI/julia-buildkite"
          - JuliaCI/julia#v1:
              # Drop default "registries" directory, so it is not persisted from execution to execution
              persist_depot_dirs: packages,artifacts,compiled
              version: '1.10' # GREP_ME: Keep this updated to LTS. Do not set it to '1' or 'stable' or 'latest'.
          - JuliaCI/sandbox#v2:
              rootfs_url: https://github.com/JuliaCI/rootfs-images/releases/download/v8.2/llvm_passes.x86_64.tar.gz
              rootfs_treehash: "ae548c7af53970ea76a9a3bd415292b7cc128688"
              workspaces:
                # Include `/cache/repos` so that our `git` version introspection works.
                - "/cache/repos:/cache/repos"
        commands: |
          echo "--- Install in-tree LLVM dependencies"
          make --output-sync -j$${JULIA_CPU_THREADS:?} -C src install-analysis-deps
          echo "+++ run clangsa/analyzegc"
          make --output-sync -j$${JULIA_CPU_THREADS:?} -C test/clangsa --keep-going
          make --output-sync -j$${JULIA_CPU_THREADS:?} -C src analyze --keep-going
        timeout_in_minutes: 60
        agents:
          queue: "test"
          sandbox_capable: "true"
          os: "linux"
          arch: "x86_64"
