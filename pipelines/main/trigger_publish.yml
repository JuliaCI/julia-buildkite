# Trigger the trusted julia-publish pipeline once all staging is complete.
#
# The `wait` barrier ensures every stage_* job has finished (so all unsigned
# artifacts are in the commit-sha-gated staging area) before publish runs.
#
# This file is uploaded by both julia-ci and julia-pr build flows, but the
# `if:` restricts the trigger to julia-ci -- the pipeline that only builds
# trusted refs. julia-pr (pull requests) never triggers publish. This is
# layered with: julia-publish not building PRs at all, and its jobs running
# verify_trusted_commit.sh.
steps:
  - wait: ~

  - trigger: "julia-publish"
    label: ":rocket: trigger publish"
    if: pipeline.slug == "julia-ci"
    build:
      commit: "${BUILDKITE_COMMIT}"
      branch: "${BUILDKITE_BRANCH}"
      message: "publish: ${BUILDKITE_MESSAGE}"
