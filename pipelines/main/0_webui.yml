# This file represents what is put into the webUI.
# It is purely for keeping track of the changes we make to the webUI configuration; modifying this file has no effect.
#
# There is no secrets management here anymore: jobs that need credentials
# obtain them at runtime via Buildkite OIDC (see utilities/aws_oidc.sh),
# and AWS IAM decides what each job identity may do. Consequently there is
# no distinction between "signed" and "unsigned" pipelines.
steps:
  - group: "Launch"
    steps:
      - label: "Launch pipelines"
        agents:
          queue: "build"
          os: "linux"
        plugins:
          - JuliaCI/external-buildkite#v1:
              version: "./.buildkite-external-version"
              repo_url: "https://github.com/JuliaCI/julia-buildkite"
        commands: |
          buildkite-agent pipeline upload .buildkite/pipelines/main/launch_unsigned_builders.yml
          buildkite-agent pipeline upload .buildkite/pipelines/main/launch_signed_jobs.yml
