# Launches the UNTRUSTED staging jobs: once each build+test finishes, the
# corresponding stage job uploads the unsigned tarball to the commit-sha
# gated staging area in S3. On protected refs it then triggers the trusted
# julia-publish pipeline, which signs + promotes to the final locations.

steps:
  - group: "Stage"
    steps:
      - label: "Launch stage jobs"
        plugins:
          - JuliaCI/external-buildkite#v1:
              version: "./.buildkite-external-version"
              repo_url: "https://github.com/JuliaCI/julia-buildkite"
          - JuliaCI/julia#d8cd48ed4e72ca4ea47a5d02d79fb1bea0ee3e6b: # v1.13.8
              # A few notes:
              # 1. We pin the `JuliaCI/julia` plugin to a full commit hash.
              #    This is intentional. We want to make sure that this script doesn't suddenly
              #    break when a new version of the plugin is released.
              # 2. We specify the Julia version up to patch, e.g. '1.7.3'.
              #    This is intentional. We don't do e.g. '1.7', because we want to make sure
              #    that this script doesn't suddenly break when a new patch release of Julia
              #    is released.
              version: '1.10.10' # GREP_ME: Keep this updated to LTS. Do not set it to '1' or 'stable' or 'latest'.
        commands: |
          export ALLOW_FAIL="false"

          # Upload even if tests fail for PR builds only.
          # For tags, release branches, and main branch: don't upload if tests fail.
          export UPLOAD_EVEN_IF_TEST_FAILURES=$(([[ "${BUILDKITE_BRANCH?}" == release-* ]] || [[ "${BUILDKITE_TAG:-}" == v* ]] || [[ "${BUILDKITE_BRANCH?}" == "main" ]] || [[ "${BUILDKITE_BRANCH?}" == "master" ]]) && echo "false" || echo "true")

          ##### Launch `stage_*` jobs to store unsigned tarballs into S3 staging once tests are done
          ### Linux:
          GROUP="Stage" \
              bash .buildkite/utilities/arches_pipeline_upload.sh \
              .buildkite/pipelines/main/platforms/upload_linux.arches \
              .buildkite/pipelines/main/platforms/stage.yml
          # PowerPC Linux, which we only run for Julia prior to 1.12:
          GROUP="Stage" \
              julia .buildkite/pipelines/main/platforms/launch_powerpc.jl \
              .buildkite/pipelines/main/platforms/upload_linux.powerpc.arches \
              .buildkite/pipelines/main/platforms/stage.yml
          ### macOS:
          GROUP="Stage" \
              bash .buildkite/utilities/arches_pipeline_upload.sh \
              .buildkite/pipelines/main/platforms/upload_macos.arches \
              .buildkite/pipelines/main/platforms/stage.yml
          ### FreeBSD:
          GROUP="Stage" \
              bash .buildkite/utilities/arches_pipeline_upload.sh \
              .buildkite/pipelines/main/platforms/upload_freebsd.arches \
              .buildkite/pipelines/main/platforms/stage.yml
          ### Windows:
          GROUP="Stage" \
              bash .buildkite/utilities/arches_pipeline_upload.sh \
              .buildkite/pipelines/main/platforms/upload_windows.arches \
              .buildkite/pipelines/main/platforms/stage.yml

          ### Upload test results.json files to buildkite
          for OS in linux linux.i686 macos freebsd windows; do \
              GROUP="Stage" \
                bash .buildkite/utilities/arches_pipeline_upload.sh \
                .buildkite/pipelines/main/platforms/test_$${OS}.arches \
                .buildkite/pipelines/main/misc/upload_buildkite_results.yml
          done

          ### Once all staging is done, trigger the trusted publish pipeline
          ### (it signs + promotes, and deploys docs).
          buildkite-agent pipeline upload .buildkite/pipelines/main/trigger_publish.yml
        agents:
          queue: "build"
          os: "linux"
          arch: "x86_64" # prevent from running on PiBots
  - group: "Allow Fail (Stage)"
    steps:
      - label: "Launch allowed-to-fail stage jobs"
        plugins:
          - JuliaCI/external-buildkite#v1:
              version: "./.buildkite-external-version"
              repo_url: "https://github.com/JuliaCI/julia-buildkite"
        commands: |
          export ALLOW_FAIL="true"

          # Upload even if tests fail for PR builds only.
          # For tags, release branches, and main branch: don't upload if tests fail.
          export UPLOAD_EVEN_IF_TEST_FAILURES=$(([[ "${BUILDKITE_BRANCH?}" == release-* ]] || [[ "${BUILDKITE_TAG:-}" == v* ]] || [[ "${BUILDKITE_BRANCH?}" == "main" ]] || [[ "${BUILDKITE_BRANCH?}" == "master" ]]) && echo "false" || echo "true")

          # Launch Linux allowed-to-fail stage jobs
          GROUP="Allow Fail (Stage)" \
              bash .buildkite/utilities/arches_pipeline_upload.sh \
              .buildkite/pipelines/main/platforms/upload_linux.soft_fail.arches \
              .buildkite/pipelines/main/platforms/stage.yml
        agents:
          queue: "build"
          os: "linux"
          arch: "x86_64" # prevent from running on PiBots
