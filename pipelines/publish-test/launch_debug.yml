# DEBUG launch (temporary): runs utilities/macos/debug_rcodesign_creds.sh in the
# julia_publish sandbox to diagnose rcodesign's AWS credential-resolution
# timeout. No julia build, no staged-artifact download -- it only assumes the
# test OIDC role and exercises rcodesign's kms:GetPublicKey call with SDK trace.
# Point the pipeline's webUI upload at this file instead of launch.yml to run it.
steps:
  - group: "Publish (test) — DEBUG"
    steps:
      - label: ":mag: debug rcodesign creds"
        key: "debug_rcodesign"
        concurrency: 1
        concurrency_group: 'publish-test/julialangnightlies'
        concurrency_method: eager
        plugins:
          - JuliaCI/external-buildkite#v1:
              version: "./.buildkite-external-version"
              repo_url: "https://github.com/JuliaCI/julia-buildkite"
          - JuliaCI/sandbox#v2:
              rootfs_url: https://github.com/JuliaCI/rootfs-images/releases/download/v8.3/julia_publish.x86_64.tar.gz
              rootfs_treehash: "e11a4f12b441b5201ba672077c000bbdea8df244"
              uid: 1000
              gid: 1000
              workspaces:
                - "/cache/repos:/cache/repos"
        timeout_in_minutes: 20
        commands: "bash .buildkite/utilities/macos/debug_rcodesign_creds.sh"
        agents:
          queue: "default"
          sandbox_capable: "true"
          os: "linux"
          arch: "x86_64"
        env:
          PUBLISH_OIDC_MODE: "publish-test"
          MACOS_CODESIGN_KMS_KEY: "alias/julia-macos-codesigning-test"
          MACOS_CODESIGN_CERT: ".buildkite/utilities/macos/developer_id_test.pem"
